##
## Host Nginx template for logos.djokodev.com
## Keep this config in sync with docs/deployment.md
##

server {
    listen 80;
    listen [::]:80;
    server_name logos.djokodev.com;

    # Keep upload ceiling aligned with Django UPLOAD_MAX_MB (25 MB).
    client_max_body_size 25M;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name logos.djokodev.com;

    # Keep upload ceiling aligned with Django UPLOAD_MAX_MB (25 MB).
    client_max_body_size 25M;

    # Replace with your real certificate paths (e.g. let's encrypt files)
    ssl_certificate /etc/letsencrypt/live/logos.djokodev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logos.djokodev.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
