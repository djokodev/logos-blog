services:
  db:
    image: postgres:15-alpine
    container_name: logos_blog_db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-logos_db}
      - POSTGRES_USER=${POSTGRES_USER:-logos_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-logos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: logos_blog_web
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - WAGTAILADMIN_BASE_URL=${WAGTAILADMIN_BASE_URL}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-True}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    container_name: logos_blog_nginx
    restart: always
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
