{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ SITE_NAME }} | {{ SITE_TAGLINE }}{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Bibliothèque éditoriale chrétienne francophone.{% endblock %}">
  <meta property="og:title" content="{% block og_title %}{{ SITE_NAME }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Questions sincères. Recherche rigoureuse. Foi chrétienne.{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ request.build_absolute_uri }}">
  <link rel="stylesheet" href="{% static 'css/site.css' %}?v=20260528b">
  <style>
    .social-links {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      justify-self: end;
    }
    .social-icon-link {
      width: 44px;
      height: 44px;
      min-width: 44px;
      min-height: 44px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .yt-icon-link {
      background: #fff1f0;
      border: 1px solid #ffd0cc;
      color: #ff2a20;
    }
    .wa-icon-link {
      background: #ffffff;
      border: 1px solid #d7dbe2;
      color: #000000;
    }
    @media (max-width: 860px) {
      .social-links {
        grid-column: 1 / -1;
        justify-self: center;
        margin-top: 0.75rem;
      }
    }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <header class="site-header" x-data="{open:false}">
    <div class="container nav-wrap">
      <a class="logo" href="{% url 'home' %}">
        <img class="logo-mark" src="{% static 'images/logo_LOGOS.png' %}" alt="LOGOS">
        <span>LOGOS</span>
      </a>
      <button class="mobile-btn" @click="open=!open">Menu</button>
      <nav :class="open ? 'open' : ''">
        <a href="{% url 'home' %}">Accueil</a>
        <a href="{% url 'article_list' %}">Articles</a>
        <a href="{% url 'about' %}">À propos</a>
      </nav>
      <div class="social-links">
        <a class="social-icon-link yt-icon-link" href="{{ YOUTUBE_URL }}" target="_blank" rel="noopener" aria-label="YouTube">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M23.5 7.2a3 3 0 0 0-2.1-2.1C19.5 4.5 12 4.5 12 4.5s-7.5 0-9.4.6A3 3 0 0 0 .5 7.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 4.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-4.8ZM9.6 15.4V8.6L15.8 12l-6.2 3.4Z"/>
          </svg>
        </a>
        <a class="social-icon-link wa-icon-link" href="https://chat.whatsapp.com/CcFiBPW2ofjLqOrgGKWK29?mode=gi_t" target="_blank" rel="noopener" aria-label="Groupe WhatsApp LOGOS">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a10 10 0 0 0-8.8 14.8L2 22l5.4-1.2A10 10 0 1 0 12 2Zm0 18.2a8.1 8.1 0 0 1-4.1-1.1l-.3-.2-3.2.7.7-3.1-.2-.3A8.2 8.2 0 1 1 12 20.2Zm4.5-5.8c-.2-.1-1.2-.6-1.4-.7-.2-.1-.3-.1-.5.1l-.4.5c-.1.1-.2.2-.4.1-.2-.1-.8-.3-1.5-.9a5.8 5.8 0 0 1-1.1-1.4c-.1-.2 0-.3.1-.4l.3-.3.2-.3c.1-.1.1-.2 0-.3l-.6-1.5c-.1-.2-.2-.2-.3-.2h-.3c-.1 0-.3 0-.5.2s-.7.6-.7 1.4c0 .8.6 1.6.7 1.7.1.1 1.2 1.9 2.9 2.6 1.7.7 1.7.5 2 .5.3 0 1.1-.4 1.2-.9.2-.5.2-.9.1-.9 0-.1-.2-.1-.4-.2Z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <main>{% block content %}{% endblock %}</main>

  <footer class="site-footer">
    <div class="container foot-minimal">
      <strong>LOGOS</strong>
    </div>
  </footer>
</body>
</html>
